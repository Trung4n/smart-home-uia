# =============================================================
# Mosquitto MQTT Broker Configuration
# =============================================================

# --- Persistence (lưu session/message khi broker restart) ---
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

allow_anonymous false
password_file /mosquitto/config/passwd

listener 1883
protocol mqtt

listener 9001
protocol websockets

# --- Giới hạn kết nối ---
max_connections 100
max_keepalive 120

# --- QoS & Message size ---
message_size_limit 10240