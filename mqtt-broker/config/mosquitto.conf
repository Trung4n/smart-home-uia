# =============================================================
# Mosquitto MQTT Broker Configuration
# =============================================================

# --- Persistence (lưu session/message khi broker restart) ---
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Listener MQTT (TCP) ---
listener 1883
protocol mqtt

# Authentication:
# Dev mode → allow_anonymous true
# Production → đổi thành false và bật password_file
allow_anonymous true
# password_file /mosquitto/config/passwd

# --- Listener WebSocket (cho frontend/browser client) ---
listener 9001
protocol websockets
allow_anonymous true

# --- Giới hạn kết nối ---
max_connections 100
max_keepalive 120

# --- QoS & Message size ---
message_size_limit 10240